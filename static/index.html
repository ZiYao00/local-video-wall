<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Civitai Video Wall v2</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header id="topbar" class="topbar">
    <div class="topline">
      <div class="path-row">
        <button id="folderPanelToggle" class="btn" title="Folders" aria-label="Folders">Folders</button>
        <div class="path-combo">
          <button id="favoritePathBtn" class="path-combo-btn" title="Favorite path" aria-label="Favorite path">Favorite</button>
          <input id="pathInput" class="path-input" type="text" placeholder="Enter a video folder path, for example C:\Users\YourName\Videos" spellcheck="false" />
          <button id="pathHistoryToggle" class="path-combo-btn" title="Path history" aria-label="Path history">History</button>
          <div id="pathHistoryMenu" class="path-history-menu hidden"></div>
          <div id="pathSuggestMenu" class="path-suggest-menu hidden"></div>
        </div>
        <button id="chooseFolderBtn" class="btn">Choose Folder</button>
        <button id="scanBtn" class="btn primary">Scan</button>
        <input id="searchInput" class="search" type="search" placeholder="Search filename..." autocomplete="off" />
        <div id="mediaFilterSeg" class="seg" title="Media type">
          <button type="button" data-media-filter="all">All</button>
          <button type="button" data-media-filter="video">Videos</button>
          <button type="button" data-media-filter="image">Images</button>
          <button type="button" data-media-filter="favorites">Favorites</button>
        </div>
        <button id="resetFiltersBtn" class="btn ghost">Reset Filters</button>
        <button id="batchToggleBtn" class="btn ghost">Batch</button>
        <select id="sortSelect" class="select" title="Sort">
          <option value="mtime_desc">Newest modified</option>
          <option value="mtime_asc">Oldest modified</option>
          <option value="name_asc">Filename A-Z</option>
          <option value="name_desc">Filename Z-A</option>
          <option value="path_asc">Path A-Z</option>
          <option value="path_desc">Path Z-A</option>
          <option value="size_desc">Size large-small</option>
          <option value="size_asc">Size small-large</option>
          <option value="random">Random order</option>
        </select>
        <select id="columnsSelect" class="select small" title="Grid columns">
          <option value="2">2 cols</option>
          <option value="3">3 cols</option>
          <option value="4">4 cols</option>
          <option value="5">5 cols</option>
          <option value="6">6 cols</option>
          <option value="7">7 cols</option>
          <option value="8">8 cols</option>
          <option value="9">9 cols</option>
          <option value="10">10 cols</option>
          <option value="11">11 cols</option>
          <option value="12">12 cols</option>
          <option value="13">13 cols</option>
          <option value="14">14 cols</option>
          <option value="15">15 cols</option>
          <option value="16">16 cols</option>
          <option value="17">17 cols</option>
          <option value="18">18 cols</option>
          <option value="19">19 cols</option>
          <option value="20">20 cols</option>
        </select>
        <span id="pageSizeLabel" class="toolbar-label">Per page</span>
        <input id="pageSizeInput" class="page-size-input" type="number" min="1" max="240" step="1" value="120" title="Items per page" />
        <button id="pauseBtn" class="btn ghost">Pause All</button>
        <button id="immersiveBtn" class="btn">Immersive</button>
        <button id="settingsToggle" class="btn icon-toggle" title="Settings" aria-label="Settings"></button>
        <div id="settingsMenu" class="settings-menu hidden">
        <div class="settings-section">
          <div id="settingsInterfaceTitle" class="settings-title">Interface</div>
          <button id="langToggle" class="btn settings-btn" title="Switch language" aria-label="Switch language"></button>
          <button id="themeToggle" class="btn settings-btn" title="Toggle theme" aria-label="Toggle theme"></button>
          <div class="settings-field">
            <span id="fontSizeLabel" class="settings-field-label">Text size</span>
            <div id="fontSizeSeg" class="seg settings-seg" title="Text size">
              <button type="button" data-font-size="small">Small</button>
              <button type="button" data-font-size="standard">Standard</button>
              <button type="button" data-font-size="large">Large</button>
            </div>
          </div>
          <div class="settings-field">
            <span id="contentAlignLabel" class="settings-field-label">Layout position</span>
            <div id="contentAlignSeg" class="seg settings-seg" title="Layout position">
              <button type="button" data-content-align="left">Left</button>
              <button type="button" data-content-align="center">Center</button>
              <button type="button" data-content-align="right">Right</button>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <div id="settingsScanTitle" class="settings-title">Scan</div>
          <label class="check settings-check"><input id="rememberPath" type="checkbox" /><span id="rememberPathLabel">Remember path</span></label>
          <label class="check settings-check"><input id="recursiveScan" type="checkbox" /><span id="recursiveScanLabel">Scan subfolders (max 2 levels)</span></label>
          <button id="excludeRulesOpen" class="btn settings-btn settings-detail-btn" type="button"><span id="excludeRulesOpenLabel">Filename exclusion rules</span><span id="excludeRulesCount">2</span></button>
        </div>
        <div class="settings-section">
          <div id="settingsPlaybackTitle" class="settings-title">Playback</div>
          <label class="check settings-check"><input id="wallAutoplay" type="checkbox" checked><span id="wallAutoplayLabel">Auto play wall</span></label>
          <label class="check settings-check"><input id="previewLargeVideos" type="checkbox"><span id="previewLargeVideosLabel">Preview large videos</span></label>
          <label class="check settings-check"><input id="pauseWhenInactive" type="checkbox"><span id="pauseWhenInactiveLabel">Pause inactive</span></label>
        </div>
        <div class="settings-section">
          <div id="settingsFiltersTitle" class="settings-title">Filters</div>
          <select id="sizeFilterSelect" class="select settings-select" title="File size">
            <option value="all">Any size</option>
            <option value="small">Under 10 MB</option>
            <option value="medium">10-50 MB</option>
            <option value="large">Over 50 MB</option>
          </select>
          <select id="dateFilterSelect" class="select settings-select" title="Modified date">
            <option value="all">Any date</option>
            <option value="day">Last 24h</option>
            <option value="week">Last 7d</option>
            <option value="month">Last 30d</option>
          </select>
        </div>
        <div class="settings-section">
          <div id="settingsActionsTitle" class="settings-title">Actions</div>
          <label class="check settings-check"><input id="confirmTrash" type="checkbox" checked><span id="confirmTrashLabel">Confirm before moving media to Recycle Bin</span></label>
          <button id="clearHistoryBtn" class="btn settings-btn">Clear Path History</button>
          <button id="exportCsvBtn" class="btn settings-btn">Export CSV</button>
        </div>
      </div>
        <button id="expandBtn" class="btn expand hidden">Expand</button>
      </div>
    </div>
  </header>
  <div id="appShell" class="app-shell">
    <aside id="folderPanel" class="folder-panel hidden" aria-label="Folder browser">
      <div class="folder-panel-head">
        <strong id="folderPanelTitle">Folders</strong>
        <div class="folder-panel-actions">
          <button id="folderPanelRefresh" class="btn ghost">Refresh</button>
          <button id="folderPanelClose" class="btn ghost">Close</button>
        </div>
      </div>
      <div class="folder-panel-section">
        <div id="folderFavoritesTitle" class="folder-panel-title">Favorites</div>
        <div id="folderFavorites" class="folder-list"></div>
      </div>
      <div class="folder-panel-section">
        <div id="folderDrivesTitle" class="folder-panel-title">Drives</div>
        <div id="folderTree" class="folder-list folder-tree"></div>
      </div>
    </aside>
    <main id="mainArea">
      <div id="batchBar" class="batch-bar hidden">
        <span id="batchInfo">0 selected</span>
        <button id="batchSelectPageBtn" class="btn">Select page</button>
        <button id="batchClearBtn" class="btn ghost">Clear</button>
        <button id="batchFavoriteBtn" class="btn">Favorite</button>
        <button id="batchUnfavoriteBtn" class="btn ghost">Unfavorite</button>
        <button id="batchTrashBtn" class="btn ghost">Move to Recycle Bin</button>
        <button id="batchExportBtn" class="btn ghost">Export CSV</button>
        <button id="batchExitBtn" class="btn ghost">Exit</button>
      </div>
      <div id="subInfo" class="status-bar hidden"></div>
      <section id="grid" class="video-grid" aria-live="polite"></section>
      <nav id="gridPager" class="grid-pager hidden" aria-label="Media pages">
        <button id="gridPagePrev" class="btn" type="button">Previous</button>
        <span id="gridPageInfo"></span>
        <button id="gridPageNext" class="btn" type="button">Next</button>
      </nav>
      <div id="emptyState" class="empty hidden"></div>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <div id="excludeRulesDialog" class="settings-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="excludeRulesTitle">
    <div class="settings-dialog-backdrop" data-exclude-close="1"></div>
    <div class="settings-dialog-panel">
      <div class="settings-dialog-head">
        <strong id="excludeRulesTitle">Filename exclusion rules</strong>
        <button id="excludeRulesClose" class="btn ghost" type="button">Close</button>
      </div>
      <label class="check settings-dialog-toggle"><input id="excludeRulesEnabled" type="checkbox" checked><span id="excludeRulesEnabledLabel">Enable filename exclusion</span></label>
      <div class="exclude-keyword-entry">
        <input id="excludeKeywordInput" class="path-input" type="text" maxlength="80" placeholder="Keyword, for example fanart">
        <button id="excludeKeywordAdd" class="btn primary" type="button">Add</button>
      </div>
      <div id="excludeKeywordList" class="exclude-keyword-list"></div>
      <div class="exclude-scope-block">
        <span id="excludeScopeLabel">Apply to</span>
        <div id="excludeScopeSeg" class="seg">
          <button type="button" data-exclude-scope="image">Images only</button>
          <button type="button" data-exclude-scope="all">Images and videos</button>
        </div>
      </div>
      <p id="excludeRulesNote" class="settings-dialog-note">Rules match the filename only and apply on the next scan.</p>
      <div class="settings-dialog-actions">
        <button id="excludeRulesCancel" class="btn ghost" type="button">Cancel</button>
        <button id="excludeRulesSave" class="btn primary" type="button">Save</button>
      </div>
    </div>
  </div>
  <div id="trashConfirmDialog" class="settings-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="trashConfirmTitle">
    <div class="settings-dialog-backdrop" data-trash-confirm="cancel"></div>
    <div class="settings-dialog-panel trash-confirm-panel">
      <div class="settings-dialog-head">
        <strong id="trashConfirmTitle">Move to Recycle Bin?</strong>
      </div>
      <p id="trashConfirmMessage" class="settings-dialog-note">Move this file to the Windows Recycle Bin?</p>
      <label class="check settings-dialog-toggle"><input id="trashConfirmDontAsk" type="checkbox"><span id="trashConfirmDontAskLabel">Don't ask again</span></label>
      <div class="settings-dialog-actions">
        <button id="trashConfirmCancel" class="btn ghost" type="button">Cancel</button>
        <button id="trashConfirmOk" class="btn primary" type="button">Move</button>
      </div>
    </div>
  </div>  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title"><strong id="modalName"></strong><span id="modalMeta"></span></div>
        <div class="modal-actions"><div id="modalContentAlignSeg" class="seg modal-align-seg" title="Layout position"><button type="button" data-content-align="left">Left</button><button type="button" data-content-align="center">Center</button><button type="button" data-content-align="right">Right</button></div><button id="modalSlideshow" class="btn hidden">Slideshow</button><button id="modalSlideshowFullscreen" class="btn hidden">Fullscreen</button><button id="modalMoveReview" class="btn">Move to Review</button><button id="modalMoveTrash" class="btn">Move to Trash</button><button id="modalOpenDefault" class="btn">Open in Default App</button><button id="modalOpenFolder" class="btn">Show in Folder</button><div id="modalVideoControls" class="modal-video-controls hidden"><div id="modalVideoModeSeg" class="seg"><button data-video-mode="loop">Loop</button><button data-video-mode="sequence">Seq</button><button data-video-mode="random">Random</button></div><button id="modalFullscreen" class="btn">Fullscreen</button><button id="modalVideoUiToggle" class="btn ghost hidden">Hide UI</button></div><button id="modalImageUiToggle" class="btn ghost hidden">Hide UI</button><button id="modalClose" class="btn ghost">Close</button></div>
      </div>
      <button id="modalPrev" class="modal-nav modal-nav-prev hidden" aria-label="Previous item">&#8249;</button>
      <button id="modalNext" class="modal-nav modal-nav-next hidden" aria-label="Next item">&#8250;</button>
      <video id="modalVideo" class="modal-video" controls loop autoplay playsinline></video>
      <img id="modalImage" class="modal-image hidden" alt="" />
      <aside id="modalMetadata" class="modal-metadata hidden" aria-label="Media metadata"></aside>
      <div id="modalHiddenActions" class="modal-hidden-actions hidden">
        <button id="modalHiddenExitFullscreen" class="btn hidden">Exit Fullscreen</button>
        <button id="modalUiShow" class="btn modal-show-ui">Show UI</button>
        <button id="modalHiddenClose" class="btn">Close</button>
      </div>
    </div>
  </div>
  <div id="slideshow" class="slideshow hidden" role="dialog" aria-modal="true">
    <div class="slideshow-stage">
      <img id="slideshowImageA" class="slideshow-image" alt="" />
      <img id="slideshowImageB" class="slideshow-image hidden" alt="" />
    </div>
    <button id="slideshowSidePrev" class="slideshow-nav slideshow-nav-prev" aria-label="Previous image">&#8249;</button>
    <button id="slideshowSideNext" class="slideshow-nav slideshow-nav-next" aria-label="Next image">&#8250;</button>
    <div class="slideshow-top">
      <div>
        <strong id="slideshowName"></strong>
        <span id="slideshowCounter"></span>
      </div>
      <div class="slideshow-controls">
        <button id="slideshowPrev" class="btn">Prev</button>
        <button id="slideshowPlay" class="btn primary">Pause</button>
        <button id="slideshowNext" class="btn">Next</button>
        <button id="slideshowMoveTrash" class="btn ghost">Move to Recycle Bin</button>
        <select id="slideshowInterval" class="select small">
          <option value="1">1s</option>
          <option value="2">2s</option>
          <option value="3">3s</option>
          <option value="4">4s</option>
          <option value="5">5s</option>
          <option value="6">6s</option>
          <option value="7">7s</option>
          <option value="8">8s</option>
          <option value="9">9s</option>
          <option value="10">10s</option>
          <option value="11">11s</option>
          <option value="12">12s</option>
          <option value="13">13s</option>
          <option value="14">14s</option>
          <option value="15">15s</option>
        </select>
        <select id="slideshowEffect" class="select">
          <option value="none">None</option>
          <option value="fade">Fade</option>
          <option value="slide">Slide</option>
          <option value="drift">Drift</option>
          <option value="random">Random</option>
        </select>
        <select id="slideshowFit" class="select">
          <option value="contain">Contain</option>
          <option value="cover">Cover</option>
        </select>
        <label class="check"><input id="slideshowLoop" type="checkbox" checked /><span id="slideshowLoopLabel">Loop</span></label>
        <button id="slideshowFullscreen" class="btn">Full Screen</button>
        <button id="slideshowUiToggle" class="btn ghost hidden">Hide</button>
        <button id="slideshowClose" class="btn ghost">Close</button>
      </div>
    </div>
    <div id="slideshowHiddenActions" class="slideshow-hidden-actions hidden">
      <button id="slideshowExitFullscreen" class="btn slideshow-exit-full hidden">Exit Full</button>
      <button id="slideshowUiShow" class="btn slideshow-show-ui">Show UI</button>
      <button id="slideshowBackToPreview" class="btn">Back</button>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
